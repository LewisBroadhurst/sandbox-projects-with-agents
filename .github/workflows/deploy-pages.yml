name: Deploy Acropolis Rising to GitHub Pages

on:
  # Deploy only when a GitHub release is published (creating a release also
  # creates its tag). This means Acropolis Rising ships on demand rather than
  # on every push to main.
  release:
    types: [published]
  # ...and allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - uses: actions/configure-pages@v5

      - run: pnpm exec nx build acropolis-rising-react

      # Stage each app into its own subfolder of the Pages site so the repo
      # can publish several apps under one base URL. Acropolis Rising ends up
      # at /sandbox-projects-with-agents/acropolis-rising-react/.
      - run: |
          mkdir -p _site/acropolis-rising-react
          cp -r apps/acropolis-rising-react/dist/. _site/acropolis-rising-react/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
